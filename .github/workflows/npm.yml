name: Publish to npm



on:
  push:
    tags:
      - v/*



jobs:

  publish-npm:

    runs-on: ubuntu-slim
    timeout-minutes: 3

    permissions:
      contents: read
      id-token: write

    steps:

      - name: Setup repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: v24
          registry-url: https://registry.npmjs.org/

      - name: Move package.json
        run: |-

          VER=$(jq -r '.version' deno.json)
          sed "s/0.0.0-VERSION/$VER/" tmp-package.json > package.json

      - name: Install
        run: |-

          npm install --no-{fund,package-lock}
          npm install --no-{fund,package-lock,save} typescript@5.9.2 esbuild@0.25.9

      - name: Build
        run: |-

          rm -r ./src/apps
          npx tsc

      - name: Bundle
        run: npx esbuild  ./dist/utils.js
                --outfile=./dist/utils.js
                --format=esm
                --allow-overwrite
                --bundle

      - name: Replace
        run: |-

          find ./dist -type f -name '*.js'   -exec perl -i -pe 's/^var /const /g' {} \;
          find ./dist -type f -name '*.d.ts' -exec perl -i -pe "s/\.ts';/.js';/g" {} \;

      - name: Publish (latest)
        if: contains(github.ref_name, '-') == false
        run: npm publish --access=public --tag=latest

      - name: Publish (next)
        if: contains(github.ref_name, '-') == true
        run: npm publish --access=public --tag=next

