name: Deploy to pico pgs

on:
  push:
    branches:
      - main



permissions:
  contents: read



jobs:
  deploy-pico-pgs:

    runs-on: ubuntu-slim

    steps:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2

      - name: Test
        run: deno task spec

      - name: Build
        run: deno task pages

      - name: Deploy to pico pgs
        uses: picosh/pgs-action@c5df20361f1c69112625315d7f2bf9c3eec95ff1 # v5
        with:
          key: ${{ secrets.PICO_PGS_PRIVATE_KEY }}
          src: ./dist/
          project: recast

