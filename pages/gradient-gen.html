<!DOCTYPE html>
<html>

<head>

    <meta charset="utf-8" />

    <title>gradients for bip39-recast gen</title>

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta http-equiv="Content-Security-Policy" content="default-src 'none';
           img-src 'self' data:;
         style-src 'self' 'unsafe-inline' raw.esm.sh:443;
        script-src 'self';
    " />

    <meta http-equiv="Permissions-Policy" content="interest-cohort=()" />

    <link   crossorigin="anonymous"
            rel="stylesheet"
            href="https://raw.esm.sh/@picocss/pico@2.1.1/css/pico.min.css"
            integrity="sha256-+8mmP8n8n3LRL9f8mAbhH6n3euT5ytFGsnADoRGbo9s="
    />

    <script type="module" src="./dist/gradient-gen.js"></script>

    <style>

        html {

            height: 100%;

            border-image: linear-gradient(to right

              , rgba(200,  63, 192, 0.882)
              , rgba(229, 227, 230, 0.055)
              , rgba( 13, 209, 194, 0.498)
              , rgba( 87, 100, 193, 0.851)
              , rgba(250, 162, 142, 0.342)
              , rgba(130,  41,  17, 0.482)
              , rgba( 48, 164, 212, 0.867)
              , rgba(222, 204,  53, 0.376)

            ) 1 / 0.20rem 0 0;

        }

        body {

            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100svh;

            & > main {
                flex: 1;
            }

        }

        pre.ground {

            position: relative;

            & > code {

                font-size: large;
                text-wrap-mode: wrap;
                padding-right: 3.4em;
                word-spacing: 0.6rem;
                line-height: 1.4;

            }

            & > button {

                position: absolute;
                top: 0;
                right: 0;
                margin: 0.6em 0.6em 0 0;
                padding: 0.5em;
                line-height: 1;

                &:hover {
                    background-color: var(--pico-text-selection-color);
                }

            }

        }

        .fade-in {

            will-change: margin-left;
            animation: fadeIn 0.3s forwards ease-out;

        }

        @keyframes fadeIn {
            0% {
                margin-left: 20%;
            }
            100% {
                margin-left: 0px;
            }
        }

        [x-size] {

            & legend {

                float: left;
                margin-right: 1.4em;

                @media screen and (max-width: 1023px) {
                    float: none;
                }

            }

            & label {

                display: inline-block;
                margin-right: 1.4em;

                @media screen and (max-width: 450px) {
                    margin-right: 0.9em;
                }

            }

        }

        [x-bg] {

            background-image: var(--gradient);

            &::after {
                display: inline-block;
                vertical-align: middle;
                float: none;
            }

        }

        section.pane {

            display: grid;
            gap: 1em;

            grid-template:
                "a c"
                "b c" 1fr / 8em 1fr
            ;

            @media screen and (max-width: 1023px) {
                align-items: center;
                grid-template:
                    "a b"
                    "c c" / 12em
                ;
            }

            & > * {
                margin-bottom: 0;
            }

            & [x-g-a] {

                font-size: larger;
                grid-area: a;
                text-align: right;
                height: max-content;

            }

            & [x-g-b] {

                grid-area: b;
                justify-self: end;
                height: max-content;
                padding: 0.4em;
                padding-right: 0;

                @media screen and (max-width: 1023px) {
                    align-items: center;
                    justify-self: start;
                }

            }

            & [x-g-c] {
                grid-area: c;
            }

        }

        details[x-item] {

            & [x-result] {

                &:has(input[name="redact"]:checked) code {
                    transform: translateZ(0);
                    filter: blur(15px);
                    will-change: filter;
                }

                & [x-sentence] {
                    text-wrap: balance;
                }

            }

        }

    </style>

</head>

<body>

    <main class="container">

        <noscript>
            <p>
                <mark>JavaScript required</mark>
            </p>
        </noscript>

        <section>

            <form method="post" id="form">

                <fieldset x-size>

                    <legend>
                        Mnemonic Sentence <strong>size</strong>:
                    </legend>

                    <label>
                        <input type="radio" name="size" value="12" /> 12
                    </label>
                    <label>
                        <input type="radio" name="size" value="15" /> 15
                    </label>
                    <label>
                        <input type="radio" name="size" value="18" /> 18
                    </label>
                    <label>
                        <input type="radio" name="size" value="21" /> 21
                    </label>
                    <label>
                        <input type="radio" name="size" value="24" checked /> 24
                    </label>

                </fieldset>

                <div class="grid" x-actions>

                    <button type="submit" id="submit" disabled>
                        <strong>Generate</strong> Random
                    </button>

                    <button type="button" id="extract" class="contrast">
                        <strong>Extract</strong> Existing
                    </button>

                </div>

            </form>

        </section>

        <section id="output"></section>

    </main>

    <template id="tpl">

        <details class="fade-in" x-item>

            <summary role="button" class="outline secondary" x-bg>
                <code x-title></code>
            </summary>

            <section class="pane">

                <select name="format" x-format x-g-a>
                    <option value="bin">binary</option>
                    <option value="dec">decimal</option>
                    <option value="hex">hex</option>
                    <option value="base58">base58</option>
                    <option value="base64">base64</option>
                    <option value="rgba" selected>rgba</option>
                </select>

                <label x-g-b>
                    <input name="CLI" type="checkbox" role="switch" />
                    CLI
                </label>

                <pre class="ground" x-g-c><code x-seed></code
                    ><button class="outline secondary"
                    >&#x1F4CB;</button>
                </pre>

            </section>

            <section class="pane" x-result>

                <strong x-g-a>
                    mnemonic sentence:
                </strong>

                <label x-g-b>
                    <input type="checkbox" name="redact" checked />
                    hide
                </label>

                <pre class="ground" x-g-c><code x-sentence></code
                    ><button class="outline secondary"
                    >&#x1F4CB;</button>
                </pre>

            </section>

        </details>

    </template>

</body>

</html>
